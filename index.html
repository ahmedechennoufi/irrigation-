function ld(k,f){try{const d=localStorage.getItem("irr_"+k);return d?JSON.parse(d):f}catch(e){return f}}

function exportExcel(injections){
  const BOM="\uFEFF";
  const hdr=["Date","Heure","Station","Groupe","Section(s)","Produit","Dose","EC (mS/cm)","pH","Durée (min)","Volume (m³)","Notes","Enregistré le"];
  const rows=injections.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>{
    const grp=GROUPS.find(g=>g.sections.some(s=>r.sections.includes(s)));
    return[fD(r.date),r.time||"",r.station,grp?grp.name:"",r.sections.join(", "),r.product,r.dose,r.ec||"",r.ph||"",r.duration||"",r.volume||"",r.notes||"",fDT(r.at)]
  });
  const esc=v=>{const s=String(v||"");return s.includes(",")||s.includes('"')||s.includes("\n")?'"'+s.replace(/"/g,'""')+'"':s};
  const csv=BOM+[hdr.map(esc).join(","),...rows.map(r=>r.map(esc).join(","))].join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="irrigation-agro-berry-"+new Date().toISOString().split("T")[0]+".csv";a.click();
}
async function ghSync(c,data){
  const ct=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  const u="https://api.github.com/repos/"+c.owner+"/"+c.repo+"/contents/data/irrigation-data.json";
  let sha=null;
  try{const e=await fetch(u,{headers:{Authorization:"token "+c.token}});if(e.ok)sha=(await e.json()).sha}catch(e){}
  const b={message:"Sync irrigation - "+new Date().toLocaleString("fr-FR"),content:ct};
  if(sha)b.sha=sha;
  return fetch(u,{method:"PUT",headers:{Authorization:"token "+c.token,"Content-Type":"application/json"},body:JSON.stringify(b)});
}
async function ghRestore(c){
  const u="https://api.github.com/repos/"+c.owner+"/"+c.repo+"/contents/data/irrigation-data.json";
  const r=await fetch(u,{headers:{Authorization:"token "+c.token}});
  if(r.ok){const f=await r.json();return JSON.parse(decodeURIComponent(escape(atob(f.content))))}
  return null;
}

function App(){

          React.createElement("div",{style:{fontSize:16}},c.i),React.createElement("div",{style:{fontSize:24,fontWeight:800,color:c.c,marginTop:2}},c.v),React.createElement("div",{style:{fontSize:9,color:c.c,fontWeight:600}},c.l)))),

function GroupView({bg,cbg,ctx,stx,bd,dark,group,injections,delInj,showForm,setShowForm,addInj}){
  const gi=injections.filter(r=>r.sections.some(s=>group.sections.includes(s)));
  const today=gi.filter(r=>isToday(r.at));
  const week=gi.filter(r=>isThisWeek(r.at));

  const secStats=group.sections.map(sk=>{
    const sec=SECTIONS[sk];
    const si=gi.filter(r=>r.sections.includes(sk));
    const st=si.filter(r=>isToday(r.at));
    const last=si.length>0?si[0]:null;
    return{sk,sec,total:si.length,today:st.length,last};
