function exportExcel(injections){
  const BOM="\uFEFF";
  const hdr=["Date","Heure","Station","Groupe","Section(s)","Produit","Dose","EC (mS/cm)","pH","Durée (min)","Volume (m³)","Notes","Enregistré le"];
  const rows=injections.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>{
    const grp=GROUPS.find(g=>g.sections.some(s=>r.sections.includes(s)));
    return[fD(r.date),r.time||"",r.station,grp?grp.name:"",r.sections.join(", "),r.product,r.dose,r.ec||"",r.ph||"",r.duration||"",r.volume||"",r.notes||"",fDT(r.at)]
  });
  const esc=v=>{const s=String(v||"");return s.includes(",")||s.includes('"')||s.includes("\n")?'"'+s.replace(/"/g,'""')+'"':s};
  const csv=BOM+[hdr.map(esc).join(","),...rows.map(r=>r.map(esc).join(","))].join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="irrigation-agro-berry-"+new Date().toISOString().split("T")[0]+".csv";a.click();
}
async function ghSync(c,data){
  const ct=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  const u="https://api.github.com/repos/"+c.owner+"/"+c.repo+"/contents/data/irrigation-data.json";
  let sha=null;
  try{const e=await fetch(u,{headers:{Authorization:"token "+c.token}});if(e.ok)sha=(await e.json()).sha}catch(e){}
  const b={message:"Sync irrigation - "+new Date().toLocaleString("fr-FR"),content:ct};
  if(sha)b.sha=sha;
  return fetch(u,{method:"PUT",headers:{Authorization:"token "+c.token,"Content-Type":"application/json"},body:JSON.stringify(b)});
}
async function ghRestore(c){
  const u="https://api.github.com/repos/"+c.owner+"/"+c.repo+"/contents/data/irrigation-data.json";
  const r=await fetch(u,{headers:{Authorization:"token "+c.token}});
  if(r.ok){const f=await r.json();return JSON.parse(decodeURIComponent(escape(atob(f.content))))}
  return null;
}

        React.createElement("div",null,React.createElement("label",{style:lbl},"⚡ EC (mS/cm)"),React.createElement("input",{type:"number",step:"0.1",placeholder:"ex: 1.8",value:ec,onChange:e=>setEc(e.target.value),style:is})),
        React.createElement("div",null,React.createElement("label",{style:lbl},"🧪 pH"),React.createElement("input",{type:"number",step:"0.1",placeholder:"ex: 5.8",value:ph,onChange:e=>setPh(e.target.value),style:is}))),

      // Duration + Volume
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}},
        React.createElement("div",null,React.createElement("label",{style:lbl},"⏱ Durée (min)"),React.createElement("input",{type:"number",placeholder:"ex: 45",value:duration,onChange:e=>setDuration(e.target.value),style:is})),
        React.createElement("div",null,React.createElement("label",{style:lbl},"💧 Volume (m³)"),React.createElement("input",{type:"number",step:"0.1",placeholder:"ex: 12.5",value:volume,onChange:e=>setVolume(e.target.value),style:is}))),

      // Notes
      React.createElement("label",{style:lbl},"📝 Notes"),
      React.createElement("textarea",{rows:3,placeholder:"Observations...",value:notes,onChange:e=>setNotes(e.target.value),style:{...is,marginBottom:16,resize:"vertical"}}),

      // Submit
      React.createElement("button",{onClick:submit,style:{width:"100%",padding:16,borderRadius:16,border:"none",background:"linear-gradient(135deg,#0EA5E9,#0284C7)",color:"#fff",fontWeight:700,fontSize:16,cursor:"pointer",boxShadow:"0 4px 16px rgba(14,165,233,0.3)",minHeight:"auto"}},"✓ Enregistrer l'injection")));
}

// ===== SETTINGS =====
function Settings({bg,cbg,ctx,stx,bd,dark,ghCfg,setGhCfg,sync,restore,syncSt,injections,setInj,customProducts,setCustomProducts,t}){
  const is={width:"100%",padding:"13px 14px",borderRadius:14,border:"2px solid "+bd,fontSize:15,outline:"none",background:cbg,color:ctx};
  const lbl={fontSize:12,fontWeight:700,color:stx,marginBottom:5,display:"block"};
  return React.createElement("div",{style:{animation:"fadeIn 0.3s"}},
    React.createElement("h2",{style:{fontSize:18,fontWeight:800,marginBottom:16}},"⚙️ Configuration"),

    // GitHub Sync
    React.createElement("div",{style:{background:cbg,borderRadius:18,padding:18,border:"1px solid "+bd,marginBottom:14}},
      React.createElement("h3",{style:{fontSize:15,fontWeight:700,marginBottom:14,display:"flex",alignItems:"center",gap:6}},"🔄 Sauvegarde GitHub"),
      React.createElement("label",{style:lbl},"Owner"),
      React.createElement("input",{value:ghCfg.owner,onChange:e=>setGhCfg({...ghCfg,owner:e.target.value}),style:{...is,marginBottom:10}}),
      React.createElement("label",{style:lbl},"Repo"),
      React.createElement("input",{value:ghCfg.repo,onChange:e=>setGhCfg({...ghCfg,repo:e.target.value}),style:{...is,marginBottom:10}}),
      React.createElement("label",{style:lbl},"Token GitHub"),
      React.createElement("input",{type:"password",value:ghCfg.token,onChange:e=>setGhCfg({...ghCfg,token:e.target.value}),placeholder:"ghp_...",style:{...is,marginBottom:14}}),
      React.createElement("div",{style:{display:"flex",gap:10}},
        React.createElement("button",{onClick:sync,disabled:syncSt==="sync",style:{flex:1,padding:14,borderRadius:14,border:"none",background:syncSt==="sync"?"#94A3B8":"linear-gradient(135deg,#0EA5E9,#0284C7)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}},syncSt==="sync"?"⏳ Sauvegarde...":"☁️ Sauvegarder"),
        React.createElement("button",{onClick:restore,disabled:syncSt==="restore",style:{flex:1,padding:14,borderRadius:14,border:"2px solid #0EA5E9",background:"transparent",color:"#0EA5E9",fontWeight:700,fontSize:14,cursor:"pointer"}},syncSt==="restore"?"⏳ Restauration...":"📥 Restaurer"))),

    // Custom products
    customProducts.length>0&&React.createElement("div",{style:{background:cbg,borderRadius:18,padding:18,border:"1px solid "+bd,marginBottom:14}},
      React.createElement("h3",{style:{fontSize:15,fontWeight:700,marginBottom:12}},"🏷️ Mes produits personnalisés ("+customProducts.length+")"),
      React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:8}},
        customProducts.map((p,i)=>React.createElement("span",{key:i,style:{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:20,background:dark?"#334155":"#F1F5F9",fontSize:12,fontWeight:600}},
          p,
          React.createElement("button",{onClick:()=>{setCustomProducts(prev=>prev.filter((_,idx)=>idx!==i))},style:{background:"none",border:"none",fontSize:14,cursor:"pointer",color:"#EF4444",padding:0,minHeight:"auto"}},"✕"))))),

    // Stats
    React.createElement("div",{style:{background:cbg,borderRadius:18,padding:18,border:"1px solid "+bd,marginBottom:14}},
      React.createElement("h3",{style:{fontSize:15,fontWeight:700,marginBottom:12}},"📊 Statistiques"),
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
        [{l:"Injections",v:injections.length,c:"#0EA5E9"},{l:"Aujourd'hui",v:injections.filter(r=>isToday(r.at)).length,c:"#10B981"},{l:"Cette semaine",v:injections.filter(r=>isThisWeek(r.at)).length,c:"#8B5CF6"},{l:"Stockage",v:Math.round(JSON.stringify(injections).length/1024)+" KB",c:"#F59E0B"}].map((s,i)=>
          React.createElement("div",{key:i,style:{padding:12,borderRadius:12,background:dark?"#1E293B":"#F8FAFC",textAlign:"center"}},
            React.createElement("div",{style:{fontSize:22,fontWeight:800,color:s.c}},s.v),
            React.createElement("div",{style:{fontSize:10,color:stx,fontWeight:600}},s.l))))),

    // Export
    React.createElement("div",{style:{background:cbg,borderRadius:18,padding:18,border:"1px solid "+bd,marginBottom:14}},
      React.createElement("h3",{style:{fontSize:15,fontWeight:700,marginBottom:12}},"📥 Export"),
      React.createElement("button",{onClick:()=>exportExcel(injections),style:{width:"100%",padding:14,borderRadius:14,border:"none",background:"linear-gradient(135deg,#10B981,#059669)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",marginBottom:10}},"📥 Exporter en Excel (CSV)"),
      React.createElement("button",{onClick:()=>{const d=JSON.stringify({injections,customProducts,exportedAt:new Date().toISOString()},null,2);const b=new Blob([d],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="irrigation-backup-"+new Date().toISOString().split("T")[0]+".json";a.click()},style:{width:"100%",padding:14,borderRadius:14,border:"2px solid "+bd,background:"transparent",color:ctx,fontWeight:700,fontSize:14,cursor:"pointer"}},"💾 Exporter JSON (backup)")),

    // Danger zone
    React.createElement("div",{style:{background:dark?"#2A1015":"#FEF2F2",borderRadius:18,padding:18,border:"1px solid "+(dark?"#5C2020":"#FECACA")}},
      React.createElement("h3",{style:{fontSize:15,fontWeight:700,color:"#DC2626",marginBottom:12}},"⚠️ Zone danger"),
      React.createElement("button",{onClick:()=>{if(confirm("⚠️ SUPPRIMER TOUTES LES DONNÉES ?\n\nCette action est irréversible !")){setInj([]);setCustomProducts([]);t("Données supprimées")}},style:{width:"100%",padding:14,borderRadius:14,border:"1px solid #DC2626",background:"transparent",color:"#DC2626",fontSize:14,fontWeight:600,cursor:"pointer"}},"🗑️ Tout supprimer")),

    // Version
    React.createElement("div",{style:{textAlign:"center",padding:18,color:stx,fontSize:11}},"Agro Berry Irrigation v"+VER+" • Ferme Zaouia"));
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
